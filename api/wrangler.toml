name = "aioverse-api"
main = "src/index.ts"
compatibility_date = "2026-04-17"

account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"

[vars]
ZONE_ID = "YOUR_ZONE_ID"
DOMAIN = "example.com"
ENV = "production"

[[routes]]
pattern = "api.example.com/*"
zone_name = "example.com"

[placement]
mode = "smart"

[observability]
enabled = true
